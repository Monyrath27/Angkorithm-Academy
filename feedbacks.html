<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>
    <div class="logo">Angkorithm Academy</div>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="feedbacks.html">Feedbacks</a></li>
            <li class="dropdown">
                <span class="dropbtn" onclick="toggleDropdown('coursesMenu')">Courses</span>
                <div id="coursesMenu" class="dropdown-menu">
                    <a href="courses.html#web">Web Development</a>
                    <a href="courses.html#mobile">Mobile Development</a>
                    <a href="courses.html#frontend">Front-End</a>
                    <a href="courses.html#backend">Back-End</a>
                    <a href="courses.html#fullstack">Full-Stack</a>
                    <a href="courses.html#ai">AI / ML</a>
                    <a href="courses.html#datascience">Data Science</a>
                </div>
            </li>
            <li class="dropdown">
                <span class="dropbtn" onclick="toggleDropdown('eventsMenu')">Events</span>
                <div id="eventsMenu" class="dropdown-menu">
                    <a href="events.html#jobs">Jobs</a>
                    <a href="events.html#workshops">Workshops</a>
                </div>
            </li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<section id="feedbacks" class="section">
    <h2>Student Feedbacks</h2>
        <div class="feedback-grid">
<script>
const feedbacks = [
  {name: "Alice", text: "This platform helped me improve my coding skills tremendously! The courses are very practical.", img: "pics/female.jpg"},
  {name: "Bona", text: "I loved the interactive projects. Great guidance from instructors!", img: "pics/male.jpg"},
  {name: "Cathy", text: "Amazing experience! I feel more confident in front-end development now.", img: "pics/female.jpg"},
  {name: "Dany", text: "The AI course was fascinating. Learned a lot of real-world applications.", img: "pics/female.jpg"},
  {name: "Ethan", text: "Very helpful and well-structured courses. Highly recommend!", img: "pics/male.jpg"},
  {name: "Fong", text: "Good content, but I wished there were more exercises for practice.", img: "pics/female.jpg"},
  {name: "Pech", text: "Helpful platform. Some lessons felt a bit fast-paced, but overall useful.", img: "pics/male.jpg"},
  {name: "Roeung", text: "The workshops are great for networking and practical knowledge.", img: "pics/male.jpg"},
  {name: "Ian", text: "I liked the courses, but sometimes the explanations could be clearer.", img: "pics/male.jpg"},
  {name: "Jasmine", text: "Excellent resources for beginners. Support from instructors is fantastic!", img: "pics/female.jpg"},
  {name: "Liminh", text: "Solid learning experience, though some modules could use more examples.", img: "pics/male.jpg"},
  {name: "Lily", text: "Most of the courses are amazing. A few lessons were a bit challenging, but I still learned a lot.", img: "pics/female.jpg"}
];

const feedbackGrid = document.querySelector(".feedback-grid");

feedbacks.forEach(fb => {
  const card = document.createElement("div");
  card.className = "feedback-card";
  card.innerHTML = `
    <img src="${fb.img}" alt="${fb.name}">
    <h4>${fb.name}</h4>
    <p>${fb.text}</p>
  `;
  feedbackGrid.appendChild(card);
});
function toggleDropdown(id){
    const menu = document.getElementById(id);
    menu.classList.toggle('show');
}

// Close dropdowns if clicking outside
document.addEventListener('click', function(event){
    const dropbtns = document.querySelectorAll('.dropbtn');
    const dropdowns = document.querySelectorAll('.dropdown-menu');

    let clickedOnDropbtn = false;
    dropbtns.forEach(btn => {
        if(btn.contains(event.target)){
            clickedOnDropbtn = true;
        }
    });

    if(!clickedOnDropbtn){
        dropdowns.forEach(menu => menu.classList.remove('show'));
    }
    });
</script>


</body>
</html>
